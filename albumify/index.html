<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Albumify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1DB954;
      --bg: #0a0a0a; --bg2: #141414; --bg3: #1e1e1e; --bg4: #2a2a2a;
      --text: #ffffff; --text2: #b3b3b3; --text3: #6a6a6a;
      --border: rgba(255,255,255,0.08);
      --radius: 8px; --radius-lg: 12px;
      --player-h: 120px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body, #root { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; -webkit-tap-highlight-color: transparent; }
    input { font: inherit; }
    img { display: block; }

    /* ── Layout ── */
    .layout { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .app { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* ── Sidebar (desktop) ── */
    .sidebar { width: 260px; min-width: 260px; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.25s ease; }
    .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 22px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; margin-bottom: 16px; }
    .new-pl-btn { width: 100%; background: var(--green); color: #000; font-weight: 700; font-size: 13px; padding: 10px 12px; border-radius: var(--radius); display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .new-pl-btn:hover { background: #1ed760; }
    .pl-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .pl-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; }
    .pl-item:hover, .pl-item.active { background: var(--bg3); }
    .pl-item-icon { width: 40px; height: 40px; background: var(--bg4); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; overflow: hidden; }
    .pl-item-icon img { width: 40px; height: 40px; object-fit: cover; }
    .pl-item-name { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
    .pl-item-count { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sidebar-user { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg4); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { color: var(--text3); font-size: 11px; text-decoration: underline; padding: 4px; }

    /* ── Mobile drawer overlay ── */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; }
    .drawer-overlay.open { display: block; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .topbar-menu-btn { width: 36px; height: 36px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 20px; flex-shrink: 0; }
    .search-wrap { flex: 1; position: relative; }
    .search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 9px 12px 9px 34px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--green); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text3); font-size: 15px; }
    .topbar-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .action-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 12px; font-size: 13px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
    .action-btn:hover, .action-btn:active { background: var(--bg4); color: var(--text); }
    .action-btn.primary { background: var(--green); color: #000; border-color: var(--green); }
    .action-btn.primary:hover { background: #1ed760; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .action-btn.icon-only { padding: 7px 9px; }

    /* ── Search results ── */
    .search-results { position: fixed; top: 62px; left: 8px; right: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); z-index: 120; max-height: 60vh; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
    .search-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border); }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:active { background: var(--bg4); }
    .search-result-art { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .search-result-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-result-artist { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .add-btn-small { background: var(--green); color: #000; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; flex-shrink: 0; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .pl-header { padding: 20px 16px; background: linear-gradient(180deg, #1a2a1a 0%, var(--bg2) 100%); display: flex; gap: 16px; align-items: flex-end; }
    .pl-cover { width: 100px; height: 100px; border-radius: var(--radius); background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; overflow: hidden; }
    .pl-cover-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100px; height: 100px; overflow: hidden; border-radius: var(--radius); }
    .pl-cover-grid img { width: 100%; height: 100%; object-fit: cover; }
    .pl-meta { min-width: 0; flex: 1; }
    .pl-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 4px; }
    .pl-title-input { background: transparent; border: none; outline: none; color: var(--text); font-size: 22px; font-weight: 800; letter-spacing: -0.5px; width: 100%; border-bottom: 2px solid transparent; transition: border-color 0.15s; }
    .pl-title-input:focus { border-bottom-color: var(--green); }
    .pl-stats { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* ── Album list ── */
    .album-list { padding: 8px 0 120px; }
    .album-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 0; transition: background 0.1s; user-select: none; -webkit-user-select: none; }
    .album-row:active { background: var(--bg3); }
    .album-row.drag-over { background: var(--bg4); outline: 2px solid var(--green); }
    .album-row.now-playing { background: rgba(29,185,84,0.08); }
    .album-row.dragging { opacity: 0.4; background: var(--bg3); }
    .drag-handle { color: var(--text3); font-size: 18px; flex-shrink: 0; padding: 4px; cursor: grab; touch-action: none; }
    .album-art { width: 52px; height: 52px; border-radius: 4px; object-fit: cover; background: var(--bg4); flex-shrink: 0; }
    .album-info { flex: 1; min-width: 0; }
    .album-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .album-artist { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .album-tracks-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .album-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.1s; font-size: 14px; }
    .icon-btn:active { background: var(--bg4); color: var(--text); }
    .playing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 1.5s ease infinite; margin-right: 4px; }
    .track-list { background: var(--bg2); border-bottom: 1px solid var(--border); overflow: hidden; }
    .track-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px 9px 24px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .track-item:last-child { border-bottom: none; }
    .track-item:active { background: var(--bg3); }
    .track-item.track-playing { background: rgba(29,185,84,0.08); }
    .track-num { font-size: 12px; color: var(--text3); min-width: 24px; text-align: center; flex-shrink: 0; }
    .track-name { font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-duration { font-size: 11px; color: var(--text3); flex-shrink: 0; }
    .track-playing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 1.5s ease infinite; }
    .album-row.expanded { background: var(--bg3); }
    .expand-indicator { font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
    .expand-indicator.open { transform: rotate(180deg); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── No selection / empty ── */
    .empty-state, .no-selection { display: flex; flex-direction: column; align-items: center; padding: 60px 24px; color: var(--text3); gap: 8px; text-align: center; }
    .no-selection { flex: 1; justify-content: center; }
    .empty-state h3, .no-selection h2 { font-size: 16px; color: var(--text2); }
    .empty-state p, .no-selection p { font-size: 13px; max-width: 260px; line-height: 1.5; }

    /* ── Login ── */
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; text-align: center; padding: 24px; }
    .login-logo { font-size: 52px; font-weight: 900; color: var(--green); letter-spacing: -2px; }
    .login-sub { font-size: 16px; color: var(--text2); max-width: 280px; line-height: 1.5; }
    .login-btn { background: var(--green); color: #000; font-weight: 800; font-size: 16px; padding: 16px 40px; border-radius: 30px; margin-top: 8px; transition: all 0.15s; }
    .login-btn:active { background: #1ed760; transform: scale(0.98); }

    /* ── Player bar ── */
    .player-bar { background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: var(--safe-bottom); }
    .player-inner { display: flex; flex-direction: column; padding: 10px 16px 8px; gap: 8px; }
    .player-top { display: flex; align-items: center; gap: 10px; }
    .player-art { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: var(--bg4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
    .player-art img { width: 100%; height: 100%; object-fit: cover; }
    .player-track { min-width: 0; flex: 1; }
    .player-track-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-track-sub { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-bottom { display: flex; flex-direction: column; gap: 4px; }
    .player-buttons { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .player-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: all 0.15s; font-size: 14px; -webkit-tap-highlight-color: transparent; }
    .player-btn:active { color: var(--text); background: var(--bg4); }
    .player-btn.play { width: 44px; height: 44px; background: var(--text); border-radius: 50%; color: #000; font-size: 16px; }
    .player-btn.play:active { transform: scale(0.95); }
    .player-btn.sm { font-size: 11px; opacity: 0.65; width: 32px; height: 32px; }
    .player-btn:disabled { opacity: 0.25; pointer-events: none; }
    .progress-wrap { display: flex; align-items: center; gap: 6px; width: 100%; }
    .progress-time { font-size: 10px; color: var(--text3); min-width: 28px; }
    .progress-time.right { text-align: right; }
    .progress-bar { flex: 1; height: 3px; background: var(--bg4); border-radius: 2px; cursor: pointer; }
    .progress-fill { height: 100%; background: var(--text3); border-radius: 2px; transition: width 0.5s linear; pointer-events: none; }
    .progress-bar:active .progress-fill { background: var(--green); }
    .player-no-device { font-size: 12px; color: var(--text3); text-align: center; padding: 16px 8px; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 24px 20px calc(24px + var(--safe-bottom)); width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 16px; }
    .modal-input:focus { border-color: var(--green); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .import-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .import-item:active { opacity: 0.7; }
    .import-art { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--bg4); }
    .scrollable { overflow-y: auto; max-height: 50vh; -webkit-overflow-scrolling: touch; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: calc(var(--player-h) + var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--green); color: var(--text); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; z-index: 300; white-space: nowrap; pointer-events: none; }

    /* ── Desktop overrides ── */
    @media (min-width: 640px) {
      .topbar-menu-btn { display: none; }
      .sidebar { position: static; transform: none !important; }
      .drawer-overlay { display: none !important; }
      .modal-overlay { align-items: center; }
      .modal { border-radius: var(--radius-lg); width: 480px; max-width: calc(100vw - 32px); padding: 24px; }
      .album-row { padding: 6px 16px; }
      .album-list { padding: 8px 0 16px; }
      .player-inner { padding: 10px 20px; }
    }

    /* ── Mobile sidebar drawer ── */
    @media (max-width: 639px) {
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 160; transform: translateX(-100%); width: 280px; min-width: 0; }
      .sidebar.open { transform: translateX(0); }
    }

    .import-option-btn { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; text-align: left; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
    .import-option-btn:hover, .import-option-btn:active { background: var(--bg4); border-color: var(--green); }
    .import-option-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .import-option-desc { font-size: 12px; color: var(--text2); }
    .help-section { margin-bottom: 20px; }
    .help-section h3 { font-size: 13px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .help-section p, .help-section li { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .help-section ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 6px; }
    .help-section li::before { content: "→ "; color: var(--green); }
    .help-divider { height: 1px; background: var(--border); margin: 16px 0; }
    .help-btn { width: 100%; background: none; border: none; color: var(--text3); font-size: 13px; padding: 10px 16px; text-align: left; display: flex; align-items: center; gap: 8px; transition: all 0.1s; cursor: pointer; }
    .help-btn:hover, .help-btn:active { background: var(--bg3); color: var(--text2); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const CLIENT_ID = 'd18c67119478426581be794900feea54';
const REDIRECT_URI = 'https://gazsicopathy.github.io/spotify-callback/';
const APP_URL = 'https://gazsicopathy.github.io/albumify/';
const SCOPES = [
  'user-read-private','user-read-email',
  'playlist-read-private','playlist-modify-public','playlist-modify-private',
  'user-read-playback-state','user-modify-playback-state','user-read-currently-playing'
].join(' ');

function generateCodeVerifier() {
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(v) {
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function generateState() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function startLogin() {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  const state = generateState();
  localStorage.setItem('pkce_verifier', verifier);
  localStorage.setItem('pkce_state', state);
  const url = new URL('https://accounts.spotify.com/authorize');
  url.searchParams.set('client_id', CLIENT_ID);
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SCOPES);
  url.searchParams.set('code_challenge_method', 'S256');
  url.searchParams.set('code_challenge', challenge);
  url.searchParams.set('state', state);
  window.location.href = url.toString();
}
async function exchangeCode(code) {
  const verifier = localStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier })
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_access_token', data.access_token);
    localStorage.setItem('spotify_refresh_token', data.refresh_token || '');
    localStorage.setItem('spotify_token_expires', Date.now() + data.expires_in * 1000);
    localStorage.removeItem('pkce_verifier'); localStorage.removeItem('pkce_state');
  }
  return data;
}
async function getToken() {
  const exp = parseInt(localStorage.getItem('spotify_token_expires') || '0');
  if (Date.now() > exp - 60000) {
    const refresh = localStorage.getItem('spotify_refresh_token');
    if (!refresh) { window.__albumifySessionExpired && window.__albumifySessionExpired(); return null; }
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'refresh_token', refresh_token: refresh })
    });
    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem('spotify_access_token', data.access_token);
      localStorage.setItem('spotify_token_expires', Date.now() + data.expires_in * 1000);
      return data.access_token;
    }
    // Refresh failed — session has expired
    window.__albumifySessionExpired && window.__albumifySessionExpired();
    return null;
  }
  return localStorage.getItem('spotify_access_token');
}
async function api(url, opts) {
  opts = opts || {};
  const token = await getToken();
  const res = await fetch(url, Object.assign({}, opts, {
    headers: Object.assign({ 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, opts.headers || {})
  }));
  if (res.status === 204 || res.status === 202) return null;
  return res.json();
}
function loadPlaylists() { try { return JSON.parse(localStorage.getItem('albumify_playlists') || '[]'); } catch(e) { return []; } }
function savePlaylists(p) { localStorage.setItem('albumify_playlists', JSON.stringify(p)); }
function fmtMs(ms) {
  if (!ms) return '0:00';
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

const h = React.createElement;
const { useState, useEffect, useRef } = React;

function App() {
  const [token, setToken] = useState(localStorage.getItem('spotify_access_token'));
  const [user, setUser] = useState(null);
  const [playlists, setPlaylists] = useState(loadPlaylists);
  const [activeId, setActiveId] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [showNew, setShowNew] = useState(false);
  const [newName, setNewName] = useState('');
  const [showImport, setShowImport] = useState(false);
  const [spotifyPls, setSpotifyPls] = useState([]);
  const [importAlbums, setImportAlbums] = useState(null);
  const [importLoading, setImportLoading] = useState(false);
  const [toast, setToast] = useState('');
  const [syncing, setSyncing] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const touchDragRef = useRef({ active: false, startIdx: null, currentIdx: null });
  const [playback, setPlayback] = useState(null);
  const [devices, setDevices] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [expandedAlbumId, setExpandedAlbumId] = useState(null);
  const [albumTracks, setAlbumTracks] = useState({});
  const [loadingTracks, setLoadingTracks] = useState(null);
  const longPressTimer = useRef(null);
  const longPressTriggered = useRef(false);
  const [sessionExpired, setSessionExpired] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [showImportExport, setShowImportExport] = useState(false);
  const [pendingImport, setPendingImport] = useState(null);
  const fileInputRef = useRef(null);
  const searchTimer = useRef(null);
  const pollTimer = useRef(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  // Register global session expiry handler — clears tokens and returns to login screen
  useEffect(() => {
    window.__albumifySessionExpired = () => {
      ['spotify_access_token','spotify_refresh_token','spotify_token_expires'].forEach(k => localStorage.removeItem(k));
      setToken(null);
      setUser(null);
      setPlayback(null);
      setSessionExpired(true);
    };
    return () => { window.__albumifySessionExpired = null; };
  }, []);

  // OAuth callback
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      exchangeCode(code).then(data => {
        if (data.access_token) { setToken(data.access_token); window.history.replaceState({}, '', APP_URL); }
        else showToast('Login failed: ' + (data.error || 'unknown'));
      });
    }
  }, []);

  useEffect(() => {
    if (!token) return;
    api('https://api.spotify.com/v1/me').then(u => { if (u && u.id) setUser(u); });
  }, [token]);

  useEffect(() => {
    clearTimeout(searchTimer.current);
    if (!searchQuery.trim() || !token) { setSearchResults([]); return; }
    searchTimer.current = setTimeout(() => {
      api('https://api.spotify.com/v1/search?q=' + encodeURIComponent(searchQuery) + '&type=album&limit=6')
        .then(data => setSearchResults(data?.albums?.items || []));
    }, 400);
  }, [searchQuery, token]);

  function fetchPlayback() {
    Promise.all([
      api('https://api.spotify.com/v1/me/player').catch(() => null),
      api('https://api.spotify.com/v1/me/player/devices').catch(() => null)
    ]).then(([playerData, devData]) => {
      const devList = devData?.devices || [];
      setDevices(devList);
      if (playerData && playerData.item) {
        setPlayback(playerData);
      } else {
        const activeDevice = devList.find(d => d.is_active) || devList[0] || null;
        setPlayback(activeDevice ? { item: null, is_playing: false, device: activeDevice, progress_ms: 0 } : null);
      }
    });
  }

  useEffect(() => {
    if (!token) return;
    fetchPlayback();
    pollTimer.current = setInterval(fetchPlayback, 3000);
    return () => clearInterval(pollTimer.current);
  }, [token]);

  function getBestDeviceId() {
    if (!devices || !devices.length) return null;
    return (devices.find(d => d.is_active) || devices[0]).id;
  }

  async function playerCmd(endpoint, method, body) {
    method = method || 'PUT';
    const tok = await getToken();
    const deviceId = getBestDeviceId();
    let url = 'https://api.spotify.com/v1/me/player/' + endpoint;
    if (deviceId && method === 'PUT') url += (url.includes('?') ? '&' : '?') + 'device_id=' + deviceId;
    await fetch(url, {
      method, headers: { 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    setTimeout(fetchPlayback, 700);
  }

  const activePl = playlists.find(p => p.id === activeId);
  const nowPlayingAlbumId = playback?.item?.album?.id;

  // Play an album within the context of the full Albumify playlist.
  // We sync the playlist to Spotify first (or reuse existing), then play
  // from the correct offset so Spotify auto-advances through all albums.
  async function playAlbumInContext(albumId, pl) {
    if (!pl || !user) return;
    showToast('Loading…');
    try {
      // Ensure we have a synced Spotify playlist
      let plId = pl.spotifyPlId;
      const allTracks = [];
      for (const album of pl.albums) {
        const data = await api('https://api.spotify.com/v1/albums/' + album.id + '/tracks?limit=50');
        if (data?.items) allTracks.push(...data.items.map(t => ({ uri: t.uri, albumId: album.id })));
      }
      if (plId) {
        // Update existing playlist tracks
        await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
          method: 'PUT', body: JSON.stringify({ uris: allTracks.slice(0,100).map(t=>t.uri) })
        });
        for (let i = 100; i < allTracks.length; i += 100) {
          await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
            method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i,i+100).map(t=>t.uri) })
          });
        }
      } else {
        // Create new Spotify playlist
        const created = await api('https://api.spotify.com/v1/users/' + user.id + '/playlists', {
          method: 'POST', body: JSON.stringify({ name: pl.name + ' (Albumify)', public: false, description: 'Created by Albumify' })
        });
        plId = created.id;
        for (let i = 0; i < allTracks.length; i += 100) {
          await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
            method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i,i+100).map(t=>t.uri) })
          });
        }
        persist(playlists.map(p => p.id !== pl.id ? p : { ...p, spotifyPlId: plId }));
      }
      // Find the offset of the first track of the target album
      const offset = allTracks.findIndex(t => t.albumId === albumId);
      const deviceId = getBestDeviceId();
      const body = {
        context_uri: 'spotify:playlist:' + plId,
        offset: { position: offset >= 0 ? offset : 0 }
      };
      if (deviceId) body.device_id = deviceId;
      const tok = await getToken();
      await fetch('https://api.spotify.com/v1/me/player/play' + (deviceId ? '?device_id=' + deviceId : ''), {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      setTimeout(fetchPlayback, 1000);
    } catch(e) { showToast('Playback failed — try again'); }
  }

  function playAlbum(albumId) {
    playAlbumInContext(albumId, activePl);
  }

  // Fetch and cache tracks for an album
  async function fetchAlbumTracks(albumId) {
    if (albumTracks[albumId]) return albumTracks[albumId];
    setLoadingTracks(albumId);
    const data = await api('https://api.spotify.com/v1/albums/' + albumId + '/tracks?limit=50');
    const tracks = data?.items || [];
    setAlbumTracks(prev => ({ ...prev, [albumId]: tracks }));
    setLoadingTracks(null);
    return tracks;
  }

  // Toggle album track list expansion
  async function toggleExpand(albumId) {
    if (expandedAlbumId === albumId) {
      setExpandedAlbumId(null);
    } else {
      setExpandedAlbumId(albumId);
      fetchAlbumTracks(albumId);
    }
  }

  // Long press handlers — long press plays the album
  function onAlbumPressStart(e, albumId) {
    longPressTriggered.current = false;
    longPressTimer.current = setTimeout(() => {
      longPressTriggered.current = true;
      playAlbum(albumId);
      // Collapse track list if open
      if (expandedAlbumId === albumId) setExpandedAlbumId(null);
    }, 500);
  }

  function onAlbumPressEnd() {
    clearTimeout(longPressTimer.current);
  }

  function onAlbumClick(albumId) {
    if (longPressTriggered.current) return; // was a long press, ignore click
    toggleExpand(albumId);
  }

  // Play a specific track within the playlist context
  async function playTrack(trackUri, albumId) {
    if (!activePl || !user) return;
    showToast('Loading…');
    try {
      let plId = activePl.spotifyPlId;
      const allTracks = [];
      for (const album of activePl.albums) {
        const data = await api('https://api.spotify.com/v1/albums/' + album.id + '/tracks?limit=50');
        if (data?.items) allTracks.push(...data.items.map(t => ({ uri: t.uri, albumId: album.id })));
      }
      if (plId) {
        await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
          method: 'PUT', body: JSON.stringify({ uris: allTracks.slice(0,100).map(t=>t.uri) })
        });
        for (let i = 100; i < allTracks.length; i += 100) {
          await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
            method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i,i+100).map(t=>t.uri) })
          });
        }
      } else {
        const created = await api('https://api.spotify.com/v1/users/' + user.id + '/playlists', {
          method: 'POST', body: JSON.stringify({ name: activePl.name + ' (Albumify)', public: false, description: 'Created by Albumify' })
        });
        plId = created.id;
        for (let i = 0; i < allTracks.length; i += 100) {
          await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
            method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i,i+100).map(t=>t.uri) })
          });
        }
        persist(playlists.map(p => p.id !== activeId ? p : { ...p, spotifyPlId: plId }));
      }
      const offset = allTracks.findIndex(t => t.uri === trackUri);
      const deviceId = getBestDeviceId();
      const body = { context_uri: 'spotify:playlist:' + plId, offset: { position: offset >= 0 ? offset : 0 } };
      if (deviceId) body.device_id = deviceId;
      const tok = await getToken();
      await fetch('https://api.spotify.com/v1/me/player/play' + (deviceId ? '?device_id=' + deviceId : ''), {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      setTimeout(fetchPlayback, 1000);
    } catch(e) { showToast('Playback failed — try again'); }
  }

  function nextAlbum() {
    if (!activePl || !nowPlayingAlbumId) return;
    const idx = activePl.albums.findIndex(a => a.id === nowPlayingAlbumId);
    if (idx === -1 || idx >= activePl.albums.length - 1) { showToast('Last album'); return; }
    playAlbumInContext(activePl.albums[idx + 1].id, activePl);
    showToast(activePl.albums[idx + 1].name);
  }

  function prevAlbum() {
    if (!activePl || !nowPlayingAlbumId) return;
    const idx = activePl.albums.findIndex(a => a.id === nowPlayingAlbumId);
    if (playback && playback.progress_ms > 3000) { playerCmd('seek?position_ms=0'); return; }
    if (idx <= 0) { showToast('First album'); return; }
    playAlbumInContext(activePl.albums[idx - 1].id, activePl);
    showToast(activePl.albums[idx - 1].name);
  }

  function persist(pls) { setPlaylists(pls); savePlaylists(pls); }

  // Silently re-sync the Spotify playlist after any reorder/add/remove,
  // then seek back to keep the current track uninterrupted.
  async function backgroundSync(updatedPl) {
    if (!updatedPl || !updatedPl.spotifyPlId || !user) return;
    try {
      const allTracks = [];
      for (const album of updatedPl.albums) {
        const data = await api('https://api.spotify.com/v1/albums/' + album.id + '/tracks?limit=50');
        if (data?.items) allTracks.push(...data.items.map(t => ({ uri: t.uri, albumId: album.id })));
      }
      // Replace playlist tracks with new order
      await api('https://api.spotify.com/v1/playlists/' + updatedPl.spotifyPlId + '/tracks', {
        method: 'PUT', body: JSON.stringify({ uris: allTracks.slice(0,100).map(t=>t.uri) })
      });
      for (let i = 100; i < allTracks.length; i += 100) {
        await api('https://api.spotify.com/v1/playlists/' + updatedPl.spotifyPlId + '/tracks', {
          method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i,i+100).map(t=>t.uri) })
        });
      }
      // If currently playing from this playlist, seek to correct position
      // so the current track continues uninterrupted in the new context
      const pb = await api('https://api.spotify.com/v1/me/player');
      if (pb && pb.item && pb.context &&
          pb.context.uri === 'spotify:playlist:' + updatedPl.spotifyPlId) {
        const currentUri = pb.item.uri;
        const currentMs = pb.progress_ms;
        const newOffset = allTracks.findIndex(t => t.uri === currentUri);
        if (newOffset >= 0) {
          const deviceId = getBestDeviceId();
          const tok = await getToken();
          await fetch('https://api.spotify.com/v1/me/player/play' + (deviceId ? '?device_id=' + deviceId : ''), {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              context_uri: 'spotify:playlist:' + updatedPl.spotifyPlId,
              offset: { position: newOffset },
              position_ms: currentMs
            })
          });
        }
      }
    } catch(e) { /* silent - do not interrupt user */ }
  }

  function createPlaylist() {
    if (!newName.trim()) return;
    const pl = { id: crypto.randomUUID(), name: newName.trim(), albums: [], created: Date.now() };
    persist([...playlists, pl]);
    setActiveId(pl.id); setShowNew(false); setNewName('');
  }

  function addAlbum(album) {
    if (!activeId) { showToast('Select or create a playlist first'); return; }
    let updated = null;
    const newPls = playlists.map(p => {
      if (p.id !== activeId) return p;
      if (p.albums.some(a => a.id === album.id)) { showToast('Already in playlist'); return p; }
      updated = { ...p, albums: [...p.albums, { id: album.id, name: album.name, artists: album.artists, images: album.images, total_tracks: album.total_tracks }] };
      return updated;
    });
    persist(newPls);
    setSearchQuery(''); setSearchResults([]);
    showToast('Added "' + album.name + '"');
    if (updated) backgroundSync(updated);
  }

  function removeAlbum(plId, albumId) {
    let updated = null;
    const newPls = playlists.map(p => {
      if (p.id !== plId) return p;
      updated = { ...p, albums: p.albums.filter(a => a.id !== albumId) };
      return updated;
    });
    persist(newPls);
    if (updated) backgroundSync(updated);
  }

  function shuffleAlbums() {
    if (!activePl) return;
    const shuffled = [...activePl.albums].sort(() => Math.random() - 0.5);
    const updated = { ...activePl, albums: shuffled };
    persist(playlists.map(p => p.id !== activeId ? p : updated));
    showToast('Albums shuffled');
    backgroundSync(updated);
  }

  function renamePlaylist(id, name) {
    const updated = playlists.map(p => p.id !== id ? p : { ...p, name });
    persist(updated);
    // If this playlist is linked to Spotify, update the Spotify playlist name too
    const pl = updated.find(p => p.id === id);
    if (pl && pl.spotifyPlId) {
      getToken().then(tok => {
        fetch('https://api.spotify.com/v1/playlists/' + pl.spotifyPlId, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name + ' (Albumify)' })
        }).catch(() => {});
      });
    }
  }

  function deletePlaylist(id) {
    const updated = playlists.filter(p => p.id !== id);
    persist(updated);
    if (activeId === id) setActiveId(updated[0]?.id || null);
  }

  function onDragStart(i) {
    setDragIdx(i);
    setExpandedAlbumId(null);
  }
  function onDragOver(e, i) { e.preventDefault(); setDragOver(i); }
  function onDrop(i) {
    if (dragIdx === null || dragIdx === i) { setDragIdx(null); setDragOver(null); return; }
    let updated = null;
    const newPls = playlists.map(p => {
      if (p.id !== activeId) return p;
      const albums = [...p.albums];
      const [moved] = albums.splice(dragIdx, 1);
      albums.splice(i, 0, moved);
      updated = { ...p, albums };
      return updated;
    });
    persist(newPls);
    setDragIdx(null); setDragOver(null);
    if (updated) backgroundSync(updated);
  }

  // Touch drag handlers for mobile reordering
  function onTouchDragStart(e, i) {
    touchDragRef.current = { active: true, startIdx: i, currentIdx: i };
    setDragIdx(i);
    setExpandedAlbumId(null);
    clearTimeout(longPressTimer.current);
  }

  function onTouchDragMove(e) {
    if (!touchDragRef.current.active) return;
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const row = el && el.closest('[data-album-index]');
    if (row) {
      const idx = parseInt(row.getAttribute('data-album-index'));
      if (!isNaN(idx) && idx !== touchDragRef.current.currentIdx) {
        touchDragRef.current.currentIdx = idx;
        setDragOver(idx);
      }
    }
  }

  function onTouchDragEnd() {
    if (!touchDragRef.current.active) return;
    const { startIdx, currentIdx } = touchDragRef.current;
    touchDragRef.current = { active: false, startIdx: null, currentIdx: null };
    if (startIdx !== null && currentIdx !== null && startIdx !== currentIdx) {
      let updated = null;
      const newPls = playlists.map(p => {
        if (p.id !== activeId) return p;
        const albums = [...p.albums];
        const [moved] = albums.splice(startIdx, 1);
        albums.splice(currentIdx, 0, moved);
        updated = { ...p, albums };
        return updated;
      });
      persist(newPls);
      if (updated) backgroundSync(updated);
    }
    setDragIdx(null); setDragOver(null);
  }

  async function syncToSpotify() {
    if (!activePl || !user) return;
    setSyncing(true);
    try {
      // Gather all track URIs in album order
      const allTracks = [];
      for (const album of activePl.albums) {
        const data = await api('https://api.spotify.com/v1/albums/' + album.id + '/tracks?limit=50');
        if (data?.items) allTracks.push(...data.items.map(t => t.uri));
      }

      let plId = activePl.spotifyPlId;

      // If we have a stored playlist ID, verify it still exists and is followable
      if (plId) {
        const tok = await getToken();
        const check = await fetch('https://api.spotify.com/v1/playlists/' + plId + '?fields=id,tracks.total', {
          headers: { 'Authorization': 'Bearer ' + tok }
        });
        let dead = false;
        if (!check.ok) {
          dead = true;
        } else {
          const data = await check.json();
          // Spotify marks deleted playlists by returning null tracks or error object
          if (!data || !data.id || data.error) dead = true;
        }
        // Also check the current user still follows it (i.e. hasn't unfollowed/deleted it)
        if (!dead) {
          const followCheck = await fetch(
            'https://api.spotify.com/v1/playlists/' + plId + '/followers/contains?ids=' + user.id,
            { headers: { 'Authorization': 'Bearer ' + tok } }
          );
          if (followCheck.ok) {
            const follows = await followCheck.json();
            if (Array.isArray(follows) && follows[0] === false) dead = true;
          }
        }
        if (dead) {
          plId = null;
          persist(playlists.map(p => p.id !== activeId ? p : { ...p, spotifyPlId: null }));
        }
      }

      if (plId) {
        // Update existing playlist tracks
        await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
          method: 'PUT', body: JSON.stringify({ uris: allTracks.slice(0, 100) })
        });
        for (let i = 100; i < allTracks.length; i += 100) {
          await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
            method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i, i + 100) })
          });
        }
        showToast('Spotify playlist updated');
      } else {
        // Create new playlist and save its ID
        const created = await api('https://api.spotify.com/v1/users/' + user.id + '/playlists', {
          method: 'POST', body: JSON.stringify({ name: activePl.name + ' (Albumify)', public: false, description: 'Created by Albumify' })
        });
        plId = created.id;
        for (let i = 0; i < allTracks.length; i += 100) {
          await api('https://api.spotify.com/v1/playlists/' + plId + '/tracks', {
            method: 'POST', body: JSON.stringify({ uris: allTracks.slice(i, i + 100) })
          });
        }
        persist(playlists.map(p => p.id !== activeId ? p : { ...p, spotifyPlId: plId }));
        showToast('Synced to Spotify');
      }
    } catch(e) { showToast('Sync failed — try again'); }
    setSyncing(false);
  }

  async function openImport() {
    setShowImport(true); setImportAlbums(null); setImportLoading(false);
    const data = await api('https://api.spotify.com/v1/me/playlists?limit=20');
    setSpotifyPls(data?.items || []);
  }

  async function importPlaylist(sp) {
    setImportLoading(true); setImportAlbums(null);
    let tracks = [];
    let url = 'https://api.spotify.com/v1/playlists/' + sp.id + '/tracks?limit=50&fields=next,items(track(album(id,name,artists,images,total_tracks)))';
    while (url) {
      const data = await api(url);
      (data?.items || []).forEach(i => { if (i.track?.album) tracks.push(i.track.album); });
      url = data?.next;
    }
    const seen = {};
    const albums = tracks.filter(a => a && a.id && !seen[a.id] && (seen[a.id] = true));
    const pl = { id: crypto.randomUUID(), name: sp.name, albums, created: Date.now() };
    persist([...playlists, pl]);
    setActiveId(pl.id); setImportAlbums(albums); setImportLoading(false);
  }

  function exportPlaylists() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      playlists: playlists.map(p => ({
        id: p.id,
        name: p.name,
        created: p.created,
        albums: p.albums.map(a => ({
          id: a.id,
          name: a.name,
          artists: a.artists,
          images: a.images,
          total_tracks: a.total_tracks
        }))
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'albumify-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Playlists exported');
  }

  function validatePlaylist(p) {
    if (!p || typeof p !== 'object') return false;
    if (typeof p.id !== 'string' || !p.id) return false;
    if (typeof p.name !== 'string' || !p.name) return false;
    if (!Array.isArray(p.albums)) return false;
    // Validate each album has the minimum required fields
    return p.albums.every(a =>
      a && typeof a === 'object' &&
      typeof a.id === 'string' && a.id &&
      typeof a.name === 'string' && a.name &&
      Array.isArray(a.artists) &&
      typeof a.total_tracks === 'number'
    );
  }

  function onFileSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    // Check file extension
    if (!file.name.endsWith('.json')) {
      showToast('Please select a .json backup file'); return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        // Must be an Albumify backup file
        if (!data || typeof data !== 'object') {
          showToast('Invalid file — not an Albumify backup'); return;
        }
        if (data.version !== 1) {
          showToast('Unrecognised backup format'); return;
        }
        if (!Array.isArray(data.playlists) || data.playlists.length === 0) {
          showToast('No playlists found in this backup'); return;
        }
        // Validate each playlist structure
        const valid = data.playlists.filter(validatePlaylist);
        const invalid = data.playlists.length - valid.length;
        if (valid.length === 0) {
          showToast('Backup file contains no valid playlists'); return;
        }
        if (invalid > 0) {
          showToast(invalid + ' playlist(s) skipped — invalid format');
        }
        setPendingImport(valid);
        setShowImportExport(true);
      } catch(e) {
        showToast('Could not read file — is this an Albumify backup?');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function doImport(mode) {
    if (!pendingImport) return;
    if (mode === 'replace') {
      persist(pendingImport);
      setActiveId(pendingImport[0]?.id || null);
      showToast('Playlists restored');
    } else {
      // Merge — skip any playlists with duplicate IDs
      const existingIds = new Set(playlists.map(p => p.id));
      const toAdd = pendingImport.filter(p => !existingIds.has(p.id));
      persist([...playlists, ...toAdd]);
      showToast(toAdd.length + ' playlist' + (toAdd.length !== 1 ? 's' : '') + ' imported');
    }
    setPendingImport(null);
    setShowImportExport(false);
    setDrawerOpen(false);
  }

  function logout() {
    ['spotify_access_token','spotify_refresh_token','spotify_token_expires'].forEach(k => localStorage.removeItem(k));
    setToken(null); setUser(null); setPlayback(null);
  }

  function selectPlaylist(id) {
    setActiveId(id);
    setDrawerOpen(false);
  }

  if (!token) {
    return h('div', { className: 'login-screen' },
      h('div', { className: 'login-logo' }, 'Albumify'),
      sessionExpired
        ? h('div', { className: 'login-sub', style: { color: '#ff6b6b' } }, 'Your session has expired. Please sign in again.')
        : h('div', { className: 'login-sub' }, 'Your music, the way you actually listen — by album.'),
      h('button', { className: 'login-btn', onClick: () => { setSessionExpired(false); startLogin(); } }, 'Connect with Spotify')
    );
  }

  const pl = activePl;
  const coverImgs = pl?.albums?.slice(0,4).map(a => a.images?.[1]?.url || a.images?.[0]?.url).filter(Boolean) || [];
  const progress = (playback?.item) ? ((playback.progress_ms / playback.item.duration_ms) * 100) : 0;

  // ── Sidebar contents (shared between desktop + drawer) ──
  const sidebarContent = [
    h('div', { key: 'header', className: 'sidebar-header' },
      h('div', { className: 'logo' }, 'Albumify'),
      h('button', { className: 'new-pl-btn', onClick: () => { setShowNew(true); setDrawerOpen(false); } }, '+ New playlist')
    ),
    h('div', { key: 'list', className: 'pl-list' },
      playlists.length === 0 && h('div', { style: { padding: '16px', fontSize: '12px', color: 'var(--text3)', textAlign: 'center' } }, 'No playlists yet'),
      playlists.map(p => {
        const img = p.albums?.[0]?.images?.[1]?.url || p.albums?.[0]?.images?.[0]?.url;
        return h('div', { key: p.id, className: 'pl-item' + (p.id === activeId ? ' active' : ''), onClick: () => selectPlaylist(p.id) },
          h('div', { className: 'pl-item-icon' }, img ? h('img', { src: img, alt: '' }) : '♫'),
          h('div', { style: { minWidth: 0 } },
            h('div', { className: 'pl-item-name' }, p.name),
            h('div', { className: 'pl-item-count' }, p.albums.length + ' album' + (p.albums.length !== 1 ? 's' : ''))
          )
        );
      })
    ),
    h('button', { key: 'export', className: 'help-btn', onClick: exportPlaylists },
      '↓  Export playlists'
    ),
    h('button', { key: 'import', className: 'help-btn', onClick: () => fileInputRef.current && fileInputRef.current.click() },
      '↑  Import playlists'
    ),
    h('input', { key: 'fileinput', ref: fileInputRef, type: 'file', accept: '.json', style: { display: 'none' }, onChange: onFileSelected }),
    h('button', { key: 'help', className: 'help-btn', onClick: () => { setShowHelp(true); setDrawerOpen(false); } },
      '?  Help & how it works'
    ),
    h('div', { key: 'user', className: 'sidebar-user' },
      user && h(React.Fragment, {},
        h('div', { className: 'user-avatar' },
          user.images?.[0]?.url ? h('img', { src: user.images[0].url, alt: '' }) : h('span', {}, (user.display_name||'?')[0])
        ),
        h('div', { className: 'user-name' }, user.display_name),
        h('button', { className: 'logout-btn', onClick: logout }, 'Sign out')
      )
    )
  ];

  return h('div', { className: 'layout' },

    // Mobile drawer overlay
    h('div', { className: 'drawer-overlay' + (drawerOpen ? ' open' : ''), onClick: () => setDrawerOpen(false) }),

    h('div', { className: 'app' },

      // Sidebar
      h('div', { className: 'sidebar' + (drawerOpen ? ' open' : '') }, sidebarContent),

      // Main panel
      h('div', { className: 'main' },

        // Topbar
        h('div', { className: 'topbar' },
          h('button', { className: 'topbar-menu-btn', onClick: () => setDrawerOpen(!drawerOpen), 'aria-label': 'Menu' }, '☰'),
          h('div', { className: 'search-wrap' },
            h('span', { className: 'search-icon' }, '🔍'),
            h('input', { className: 'search-input', placeholder: 'Search albums…', value: searchQuery, onChange: e => setSearchQuery(e.target.value) }),
            searchResults.length > 0 && h('div', { className: 'search-results' },
              searchResults.map(album => {
                const img = album.images?.[2]?.url;
                return h('div', { key: album.id, className: 'search-result-item', onClick: () => addAlbum(album) },
                  img && h('img', { className: 'search-result-art', src: img, alt: '' }),
                  h('div', { style: { flex: 1, minWidth: 0 } },
                    h('div', { className: 'search-result-name' }, album.name),
                    h('div', { className: 'search-result-artist' }, (album.artists||[]).map(a=>a.name).join(', ') + ' · ' + album.total_tracks + ' tracks')
                  ),
                  h('button', { className: 'add-btn-small', onClick: e => { e.stopPropagation(); addAlbum(album); } }, 'Add')
                );
              })
            )
          ),
          h('div', { className: 'topbar-actions' },
            h('button', { className: 'action-btn icon-only', title: 'Import from Spotify', onClick: openImport }, '↓'),
            pl && h('button', { className: 'action-btn icon-only', title: 'Shuffle albums', onClick: shuffleAlbums }, '⇄'),
            pl && h('button', { className: 'action-btn primary', onClick: syncToSpotify, disabled: syncing || !pl.albums.length },
              syncing ? '…' : (pl.spotifyPlId ? 'Update' : 'Sync')
            )
          )
        ),

        // Content
        h('div', { className: 'content' },
          !pl
            ? h('div', { className: 'no-selection' },
                h('div', { style: { fontSize: 48 } }, '♫'),
                h('h2', {}, 'No playlist selected'),
                h('p', {}, 'Tap ☰ to open your playlists, or create a new one.'),
                h('button', { className: 'action-btn primary', style: { marginTop: 12 }, onClick: () => setShowNew(true) }, '+ New playlist')
              )
            : h(React.Fragment, {},
                h('div', { className: 'pl-header' },
                  h('div', { className: 'pl-cover' },
                    coverImgs.length >= 4
                      ? h('div', { className: 'pl-cover-grid' }, coverImgs.slice(0,4).map((u,i) => h('img', { key: i, src: u, alt: '' })))
                      : coverImgs.length > 0
                        ? h('img', { src: coverImgs[0], alt: '', style: { width: '100%', height: '100%', objectFit: 'cover' } })
                        : h('span', {}, '♫')
                  ),
                  h('div', { className: 'pl-meta' },
                    h('div', { className: 'pl-type' }, 'Album playlist'),
                    h('input', { className: 'pl-title-input', value: pl.name, onChange: e => renamePlaylist(pl.id, e.target.value), 'aria-label': 'Playlist name' }),
                    h('div', { className: 'pl-stats' },
                      pl.albums.length + ' album' + (pl.albums.length !== 1 ? 's' : '') + ' · ' +
                      pl.albums.reduce((s,a) => s + (a.total_tracks||0), 0) + ' tracks' +
                      (pl.spotifyPlId ? ' · synced' : '')
                    )
                  ),
                  h('button', { className: 'icon-btn', style: { marginLeft: 'auto', alignSelf: 'flex-start' }, onClick: () => { if (confirm('Delete "' + pl.name + '"?')) deletePlaylist(pl.id); } }, '🗑')
                ),

                pl.albums.length === 0
                  ? h('div', { className: 'empty-state' },
                      h('div', { style: { fontSize: 48 } }, '♫'),
                      h('h3', {}, 'No albums yet'),
                      h('p', {}, 'Search for albums above and add them here.')
                    )
                  : h('div', { className: 'album-list' },
                      pl.albums.map((album, i) => {
                        const artUrl = album.images?.[1]?.url || album.images?.[0]?.url;
                        const isPlaying = nowPlayingAlbumId === album.id;
                        const isExpanded = expandedAlbumId === album.id;
                        const tracks = albumTracks[album.id] || [];
                        const nowPlayingTrackUri = playback?.item?.uri;

                        return h(React.Fragment, { key: album.id },
                          h('div', {
                            'data-album-index': i,
                            className: 'album-row' + (dragOver === i ? ' drag-over' : '') + (isPlaying ? ' now-playing' : '') + (dragIdx === i ? ' dragging' : '') + (isExpanded ? ' expanded' : ''),
                            draggable: true,
                            onClick: () => onAlbumClick(album.id),
                            onMouseDown: e => onAlbumPressStart(e, album.id),
                            onMouseUp: onAlbumPressEnd,
                            onMouseLeave: onAlbumPressEnd,
                            onTouchStart: e => onAlbumPressStart(e, album.id),
                            onTouchEnd: onAlbumPressEnd,
                            onDragStart: () => onDragStart(i),
                            onDragOver: e => onDragOver(e, i),
                            onDrop: () => onDrop(i),
                            onDragEnd: () => { setDragIdx(null); setDragOver(null); }
                          },
                            h('span', {
                              className: 'drag-handle',
                              title: 'Hold to reorder',
                              onTouchStart: e => { e.stopPropagation(); onTouchDragStart(e, i); },
                              onTouchMove: e => onTouchDragMove(e),
                              onTouchEnd: () => onTouchDragEnd(),
                              onClick: e => e.stopPropagation()
                            }, '⠿'),
                            artUrl
                              ? h('img', { className: 'album-art', src: artUrl, alt: '' })
                              : h('div', { className: 'album-art', style: { display: 'flex', alignItems: 'center', justifyContent: 'center' } }, '♫'),
                            h('div', { className: 'album-info' },
                              h('div', { className: 'album-name' }, album.name),
                              h('div', { className: 'album-artist' }, (album.artists||[]).map(a=>a.name).join(', ')),
                              h('div', { className: 'album-tracks-label' }, album.total_tracks + ' tracks')
                            ),
                            h('div', { className: 'album-actions' },
                              isPlaying && h('div', { className: 'playing-dot' }),
                              h('span', { className: 'expand-indicator' + (isExpanded ? ' open' : '') }, '▾'),
                              h('button', { className: 'icon-btn', title: 'Remove', onClick: e => { e.stopPropagation(); removeAlbum(pl.id, album.id); } }, '🗑')
                            )
                          ),
                          // Track list
                          isExpanded && h('div', { className: 'track-list' },
                            loadingTracks === album.id
                              ? h('div', { style: { padding: '12px 24px', fontSize: '12px', color: 'var(--text3)' } }, 'Loading tracks…')
                              : tracks.map((track, ti) => {
                                  const isTrackPlaying = nowPlayingTrackUri === track.uri;
                                  return h('div', {
                                    key: track.id,
                                    className: 'track-item' + (isTrackPlaying ? ' track-playing' : ''),
                                    onClick: e => { e.stopPropagation(); playTrack(track.uri, album.id); }
                                  },
                                    isTrackPlaying
                                      ? h('div', { className: 'track-playing-dot' })
                                      : h('span', { className: 'track-num' }, ti + 1),
                                    h('div', { className: 'track-name' }, track.name),
                                    h('span', { className: 'track-duration' }, fmtMs(track.duration_ms))
                                  );
                                })
                          )
                        );
                      })
                    )
              )
        )
      )
    ),

    // Player bar
    h('div', { className: 'player-bar' },
      h('div', { className: 'player-inner' },
        playback?.item
          ? h(React.Fragment, {},
              h('div', { className: 'player-top' },
                h('div', { className: 'player-art' },
                  playback.item.album?.images?.[2]?.url
                    ? h('img', { src: playback.item.album.images[2].url, alt: '' })
                    : '♫'
                ),
                h('div', { className: 'player-track' },
                  h('div', { className: 'player-track-name' }, playback.item.name),
                  h('div', { className: 'player-track-sub' },
                    (playback.item.artists||[]).map(a=>a.name).join(', ') + (playback.item.album ? ' · ' + playback.item.album.name : '')
                  )
                )
              ),
              h('div', { className: 'player-bottom' },
                h('div', { className: 'progress-wrap' },
                  h('span', { className: 'progress-time' }, fmtMs(playback.progress_ms)),
                  h('div', { className: 'progress-bar', onClick: e => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    playerCmd('seek?position_ms=' + Math.floor(((e.clientX - rect.left) / rect.width) * playback.item.duration_ms));
                  }}, h('div', { className: 'progress-fill', style: { width: progress.toFixed(1) + '%' } })),
                  h('span', { className: 'progress-time right' }, fmtMs(playback.item.duration_ms))
                ),
                h('div', { className: 'player-buttons' },
                  h('button', { className: 'player-btn', title: 'Prev album', onClick: prevAlbum }, '⏮'),
                  h('button', { className: 'player-btn sm', title: 'Prev track', onClick: () => playerCmd('previous', 'POST') }, '◀'),
                  h('button', { className: 'player-btn play', onClick: () => playerCmd(playback.is_playing ? 'pause' : 'play') }, playback.is_playing ? '❙❙' : '▶'),
                  h('button', { className: 'player-btn sm', title: 'Next track', onClick: () => playerCmd('next', 'POST') }, '▶'),
                  h('button', { className: 'player-btn', title: 'Next album', onClick: nextAlbum }, '⏭')
                )
              )
            )
          : playback?.device
            ? h(React.Fragment, {},
                h('div', { className: 'player-top' },
                  h('div', { className: 'player-art' }, '📱'),
                  h('div', { className: 'player-track' },
                    h('div', { className: 'player-track-name' }, playback.device.name),
                    h('div', { className: 'player-track-sub' }, 'Ready — tap an album to start')
                  )
                ),
                h('div', { className: 'player-bottom' },
                  h('div', { className: 'player-buttons' },
                    h('button', { className: 'player-btn', disabled: true }, '⏮'),
                    h('button', { className: 'player-btn sm', disabled: true }, '◀'),
                    h('button', { className: 'player-btn play', onClick: () => playerCmd('play') }, '▶'),
                    h('button', { className: 'player-btn sm', disabled: true }, '▶'),
                    h('button', { className: 'player-btn', disabled: true }, '⏭')
                  )
                )
              )
            : h('div', { className: 'player-no-device' }, 'Open Spotify on any device to enable controls')
      )
    ),

    // New playlist modal
    showNew && h('div', { className: 'modal-overlay', onClick: e => e.target === e.currentTarget && setShowNew(false) },
      h('div', { className: 'modal' },
        h('h2', {}, 'New album playlist'),
        h('input', { className: 'modal-input', placeholder: 'Playlist name…', value: newName, autoFocus: true, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && createPlaylist() }),
        h('div', { className: 'modal-actions' },
          h('button', { className: 'action-btn', onClick: () => setShowNew(false) }, 'Cancel'),
          h('button', { className: 'action-btn primary', onClick: createPlaylist }, 'Create')
        )
      )
    ),

    // Import modal
    showImport && h('div', { className: 'modal-overlay', onClick: e => e.target === e.currentTarget && setShowImport(false) },
      h('div', { className: 'modal' },
        h('h2', {}, 'Import from Spotify'),
        importLoading
          ? h('div', { style: { textAlign: 'center', padding: '32px', color: 'var(--text2)', fontSize: '14px' } }, 'Grouping tracks by album…')
          : importAlbums
            ? h(React.Fragment, {},
                h('p', { style: { fontSize: '14px', color: 'var(--text2)', marginBottom: '12px' } }, 'Found ' + importAlbums.length + ' albums.'),
                h('div', { className: 'scrollable' },
                  importAlbums.map(a => {
                    const img = a.images?.[2]?.url;
                    return h('div', { key: a.id, className: 'import-item' },
                      img && h('img', { className: 'import-art', src: img, alt: '' }),
                      h('div', {},
                        h('div', { style: { fontWeight: 600, fontSize: '13px' } }, a.name),
                        h('div', { style: { fontSize: '11px', color: 'var(--text2)' } }, (a.artists||[]).map(x=>x.name).join(', '))
                      ),
                      h('span', { style: { marginLeft: 'auto', color: 'var(--green)', fontWeight: 700 } }, '✓')
                    );
                  })
                ),
                h('div', { className: 'modal-actions', style: { marginTop: 16 } },
                  h('button', { className: 'action-btn primary', onClick: () => setShowImport(false) }, 'Done')
                )
              )
            : h(React.Fragment, {},
                h('p', { style: { fontSize: '14px', color: 'var(--text2)', marginBottom: '12px' } }, 'Pick a Spotify playlist to import.'),
                h('div', { className: 'scrollable' },
                  spotifyPls.map(sp => {
                    const img = sp.images?.[0]?.url;
                    return h('div', { key: sp.id, className: 'import-item', onClick: () => importPlaylist(sp) },
                      img && h('img', { className: 'import-art', src: img, alt: '' }),
                      h('div', {},
                        h('div', { style: { fontWeight: 600, fontSize: '13px' } }, sp.name),
                        h('div', { style: { fontSize: '11px', color: 'var(--text2)' } }, (sp.tracks?.total || 0) + ' tracks')
                      )
                    );
                  })
                ),
                h('div', { className: 'modal-actions', style: { marginTop: 16 } },
                  h('button', { className: 'action-btn', onClick: () => setShowImport(false) }, 'Cancel')
                )
              )
      )
    ),

    // Import options modal
    showImportExport && pendingImport && h('div', { className: 'modal-overlay', onClick: e => e.target === e.currentTarget && (setShowImportExport(false), setPendingImport(null)) },
      h('div', { className: 'modal' },
        h('h2', {}, 'Import playlists'),
        h('p', { style: { fontSize: '13px', color: 'var(--text2)', marginBottom: '16px' } },
          'Found ' + pendingImport.length + ' playlist' + (pendingImport.length !== 1 ? 's' : '') + ' in this backup. How would you like to import?'
        ),
        h('button', { className: 'import-option-btn', onClick: () => doImport('merge') },
          h('div', { className: 'import-option-title' }, 'Merge with existing'),
          h('div', { className: 'import-option-desc' }, 'Add imported playlists alongside your current ones. Duplicates are skipped.')
        ),
        h('button', { className: 'import-option-btn', onClick: () => doImport('replace') },
          h('div', { className: 'import-option-title' }, 'Replace everything'),
          h('div', { className: 'import-option-desc' }, 'Remove all current playlists and restore from backup.')
        ),
        h('div', { className: 'modal-actions', style: { marginTop: '8px' } },
          h('button', { className: 'action-btn', onClick: () => { setShowImportExport(false); setPendingImport(null); } }, 'Cancel')
        )
      )
    ),

    // Help modal
    showHelp && h('div', { className: 'modal-overlay', onClick: e => e.target === e.currentTarget && setShowHelp(false) },
      h('div', { className: 'modal' },
        h('h2', {}, 'How to use Albumify'),

        h('div', { className: 'help-section' },
          h('p', {}, 'Albumify lets you create playlists of whole albums, rather than individual tracks. It works alongside your existing Spotify account and controls playback on any active Spotify device.')
        ),

        h('div', { className: 'help-divider' }),

        h('div', { className: 'help-section' },
          h('h3', {}, 'Getting started'),
          h('ul', {},
            h('li', {}, 'Tap + New playlist to create an album playlist'),
            h('li', {}, 'Use the search bar to find albums and add them'),
            h('li', {}, 'Tap any album to see its tracks, or long press to play it immediately')
          )
        ),

        h('div', { className: 'help-divider' }),

        h('div', { className: 'help-section' },
          h('h3', {}, 'Playback'),
          h('ul', {},
            h('li', {}, 'Albumify controls whichever Spotify device is currently active — make sure Spotify is open on your phone or computer first'),
            h('li', {}, 'When you play an album, Albumify syncs your playlist to Spotify behind the scenes so albums advance automatically when one finishes'),
            h('li', {}, 'Use the player bar at the bottom to play/pause, skip tracks, or jump between albums with the ⏮ ⏭ buttons')
          )
        ),

        h('div', { className: 'help-divider' }),

        h('div', { className: 'help-section' },
          h('h3', {}, 'Managing playlists'),
          h('ul', {},
            h('li', {}, 'Drag the ⠿ handle to reorder albums'),
            h('li', {}, 'Shuffle randomises the album order'),
            h('li', {}, 'Sync to Spotify creates a real Spotify playlist from your album playlist — useful for sharing or playing outside Albumify'),
            h('li', {}, 'Once synced, the button changes to Update and keeps the Spotify playlist in sync automatically')
          )
        ),

        h('div', { className: 'help-divider' }),

        h('div', { className: 'help-section' },
          h('h3', {}, 'Good to know'),
          h('ul', {},
            h('li', {}, 'Your playlists are saved on this device only'),
            h('li', {}, 'Albumify requires a Spotify Premium account for playback control'),
            h('li', {}, "Editing the synced playlist directly in Spotify won't affect Albumify — Albumify is always the source of truth")
          )
        ),

        h('div', { className: 'help-divider' }),

        h('div', { className: 'help-section' },
          h('h3', {}, 'Backup & restore'),
          h('ul', {},
            h('li', {}, 'Use Export playlists in the sidebar to download a backup file of all your album playlists'),
            h('li', {}, 'If you clear your browser cache or switch devices, use Import playlists to restore from a backup'),
            h('li', {}, 'When importing, you can choose to merge with existing playlists or replace everything with the backup'),
            h('li', {}, 'Only files exported from Albumify can be imported — keep your backup file somewhere safe like email or cloud storage')
          )
        ),

        h('div', { className: 'modal-actions' },
          h('button', { className: 'action-btn primary', onClick: () => setShowHelp(false) }, 'Got it')
        )
      )
    ),

    toast && h('div', { className: 'toast' }, toast)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, {}));
</script>
</body>
</html>
